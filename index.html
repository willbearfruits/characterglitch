<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Character Glitch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040503;
  --ink:#adc69a;
  --soft:#65765d;
  --hot:#d7bc79;
  --line:rgba(173,198,154,0.16);
}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font:12px/1.5 "Courier New", Courier, monospace;
  overflow:auto;
  cursor:none;
}
canvas{
  position:fixed;
  inset:0;
  display:block;
  opacity:.42;
}
main{
  position:relative;
  z-index:2;
  width:min(700px,calc(100vw - 24px));
  margin:22px auto 40px;
}
h1{
  font-size:12px;
  font-weight:normal;
  letter-spacing:.08em;
  text-transform:lowercase;
}
p{
  max-width:60ch;
  color:var(--soft);
  margin-top:8px;
}
.list{
  margin-top:18px;
  border-top:1px solid var(--line);
}
.item{
  display:block;
  color:var(--ink);
  text-decoration:none;
  border-bottom:1px solid var(--line);
  padding:8px 0 9px;
  white-space:pre-wrap;
}
.item:hover,.item:focus-visible,.item.active{
  color:#e3f3c2;
  outline:none;
}
.meta{
  margin-top:18px;
  display:grid;
  gap:10px;
}
.label{
  color:var(--hot);
}
.value{
  white-space:pre-wrap;
}
.cursor{
  position:fixed;
  left:0;
  top:0;
  z-index:4;
  pointer-events:none;
  color:rgba(227,243,194,0.72);
  transform:translate(-50%,-50%);
}
@media (max-width:860px){
  body{cursor:auto}
  main{width:calc(100vw - 20px);margin:14px auto 24px}
  .cursor{display:none}
  canvas{opacity:.32}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<main>
  <h1>character glitch / index</h1>
  <p>Five pieces worth surfacing. Bare index, direct links, no wrapper logic beyond selection and routing.</p>

  <nav id="experiments" class="list" aria-label="Experiments"></nav>

  <section class="meta">
    <div>
      <div class="label">signal</div>
      <div id="glyph" class="value"></div>
    </div>
    <div>
      <div class="label">selected</div>
      <div id="title" class="value"></div>
    </div>
    <div>
      <div class="label">behavior</div>
      <div id="description" class="value"></div>
    </div>
    <div>
      <div class="label">input</div>
      <div id="controls" class="value"></div>
    </div>
    <div>
      <div class="label">keys</div>
      <div class="value">01..05 jump
↑ ↓ move
enter open</div>
    </div>
  </section>
</main>

<div id="cursor" class="cursor">⌖</div>

<script>
const experiments=[
  {
    title:'zalgo vortex',
    file:'zalgo_vortex.html',
    code:'01',
    glyph:'◌̸ ╱╲ ◌̴',
    strap:'orbiting fields / spawned vortices',
    description:'Energy wells orbit inside a character grid. Mouse motion bends brightness. Click adds another vortex.',
    controls:'mousemove, touchmove, click'
  },
  {
    title:'de jong organism',
    file:'dejong_organism.html',
    code:'02',
    glyph:'◍◌✦◌◍',
    strap:'strange attractor / trail body',
    description:'A de Jong attractor is iterated at high density each frame, accumulating a living cloud of marks.',
    controls:'mousemove, touchmove, click'
  },
  {
    title:'mycelium network',
    file:'mycelium_network.html',
    code:'03',
    glyph:'┼╱╲◆╱╲┼',
    strap:'branching hyphae / fusion nodes',
    description:'Agents branch, fuse, and die into nodes while following and reinforcing fungal trails.',
    controls:'mousemove, touchmove, click'
  },
  {
    title:'physarum zalgo',
    file:'physarum_zalgo.html',
    code:'04',
    glyph:'∙╲╳╱∙̴',
    strap:'slime mold swarm / pheromone field',
    description:'Thousands of agents sense, turn, and deposit pheromone, producing dense woven glyph tissue.',
    controls:'mousemove, touchmove, click, wheel'
  },
  {
    title:'fractal',
    file:'fractal.html',
    code:'05',
    glyph:'█⇵∎⇵█',
    strap:'burning ship / tears / shockwave',
    description:'A hard-edged fractal chamber with lens distortion, glitch tear lines, and click shockwaves.',
    controls:'mousemove, touchmove, click, wheel'
  }
];

const nav=document.getElementById('experiments');
const glyphEl=document.getElementById('glyph');
const titleEl=document.getElementById('title');
const descriptionEl=document.getElementById('description');
const controlsEl=document.getElementById('controls');
const cursor=document.getElementById('cursor');

let current=0;

function formatLine(exp,isActive){
  const mark=isActive?'>':' ';
  return `${mark}${exp.code}  ${exp.title}\n  ${exp.strap}`;
}

function glitchLine(seed){
  const above=['\u0300','\u0301','\u0302','\u0303','\u0307','\u0308','\u030A','\u030C'];
  const below=['\u0323','\u0324','\u0325','\u0330','\u0331','\u0332'];
  const pool='.-=:/\\\\|'.split('');
  let out='';
  for(let i=0;i<seed.length+7;i++){
    let ch=pool[(i*2+seed.length)%pool.length];
    if(i%3===0)ch+=above[(i+seed.length)%above.length];
    if(i%5===0)ch+=below[(i*2+seed.length)%below.length];
    out+=ch;
  }
  return out;
}

function renderList(){
  nav.innerHTML=experiments.map((exp,i)=>`<a class="item${i===current?' active':''}" href="${exp.file}" data-index="${i}">${formatLine(exp,i===current)}</a>`).join('');
  nav.querySelectorAll('.item').forEach(link=>{
    link.addEventListener('mouseenter',()=>setCurrent(Number(link.dataset.index)));
    link.addEventListener('focus',()=>setCurrent(Number(link.dataset.index)));
  });
}

function setCurrent(index){
  current=(index+experiments.length)%experiments.length;
  const exp=experiments[current];
  nav.querySelectorAll('.item').forEach((link,i)=>{
    link.classList.toggle('active',i===current);
    link.textContent=formatLine(experiments[i],i===current);
  });
  glyphEl.textContent=`${exp.glyph}\n${glitchLine(exp.title)}`;
  titleEl.textContent=`${exp.code} ${exp.title}\n${exp.file}`;
  descriptionEl.textContent=exp.description;
  controlsEl.textContent=exp.controls;
}

renderList();
setCurrent(0);

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown' || e.key==='j'){
    e.preventDefault();
    setCurrent(current+1);
  }else if(e.key==='ArrowUp' || e.key==='k'){
    e.preventDefault();
    setCurrent(current-1);
  }else if(/^[1-5]$/.test(e.key)){
    setCurrent(Number(e.key)-1);
  }else if(e.key==='Enter'){
    window.location.href=experiments[current].file;
  }
});

document.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});

const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const CELL=13;
let W,H,cols,rows,t=0,mx=0.5,my=0.5,pmx=0.5,pmy=0.5,field;
const DUST='·∶⋅.'.split('');
const THREAD='─│╱╲╳'.split('');
const WEAVE='░▒▓■◆'.split('');
const NODE='✦✧✶'.split('');
const ABOVE=['\u0300','\u0301','\u0302','\u0303','\u0307','\u0308','\u030A'];
const BELOW=['\u0323','\u0324','\u0325','\u0330','\u0331'];
let wells=[];

function resize(){
  W=window.innerWidth;
  H=window.innerHeight;
  cv.width=W;
  cv.height=H;
  cols=Math.floor(W/(CELL*0.58));
  rows=Math.floor(H/(CELL*1.04));
  field=new Float32Array(cols*rows);
  ctx.font=CELL+'px Courier New';
  ctx.textBaseline='top';
  wells=[
    {x:0.24,y:0.28,vx:0.0010,vy:0.0004,s:1.0},
    {x:0.72,y:0.36,vx:-0.0008,vy:0.0009,s:0.88},
    {x:0.46,y:0.74,vx:0.0006,vy:-0.0006,s:0.78}
  ];
}

function hsl(h,s,l){
  const hp=((h%360)+360)%360;
  const sp=s/100;
  const lp=l/100;
  const k=n=>(n+hp/30)%12;
  const a=sp*Math.min(lp,1-lp);
  const f=n=>lp-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1));
  return[ Math.round(f(0)*255), Math.round(f(8)*255), Math.round(f(4)*255) ];
}

function noise(x,y,s){
  return Math.sin(x*s+t*0.7)*Math.cos(y*s*0.6-t*0.35)+Math.sin((x+y)*s*0.48+t*0.85)*0.42;
}

function updateWells(){
  for(const w of wells){
    w.x+=w.vx;
    w.y+=w.vy;
    w.vx+=(0.5-w.x)*0.00004;
    w.vy+=(0.5-w.y)*0.00004;
    if(w.x<0.06||w.x>0.94)w.vx*=-0.9;
    if(w.y<0.06||w.y>0.94)w.vy*=-0.9;
  }
}

function draw(){
  t+=0.017;
  pmx+=(mx-pmx)*0.06;
  pmy+=(my-pmy)*0.06;
  updateWells();

  ctx.fillStyle='#040503';
  ctx.fillRect(0,0,W,H);

  const cw=CELL*0.58;
  const ch=CELL*1.04;
  const focus=(current+1)/experiments.length;

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const idx=r*cols+c;
      const fx=c/cols;
      const fy=r/rows;
      let en=Math.abs(noise(fx,fy,5))*0.16;

      for(const w of wells){
        const dx=fx-w.x;
        const dy=fy-w.y;
        const d=Math.sqrt(dx*dx+dy*dy)+0.025;
        en+=w.s/(d*11+0.8)*0.42;
      }

      const md=Math.sqrt((fx-pmx)*(fx-pmx)+(fy-pmy)*(fy-pmy))+0.03;
      en+=0.28/(md*15+0.7);
      en+=Math.sin((fx*6+fy*4+t*0.7+focus*4))*0.06+0.06;

      field[idx]=field[idx]*0.83+en*0.17;
      const norm=Math.max(0,Math.min(field[idx]/1.08,1));
      if(norm<0.12)continue;

      let glyph;
      if(norm<0.25)glyph=DUST[Math.floor(norm*DUST.length*4)%DUST.length];
      else if(norm<0.52)glyph=THREAD[Math.floor((noise(fx,fy,7)+1)*THREAD.length)%THREAD.length];
      else if(norm<0.84)glyph=WEAVE[Math.floor(norm*WEAVE.length)%WEAVE.length];
      else glyph=NODE[Math.floor((t*2+c*0.1+r*0.07)%NODE.length)];

      if(norm>0.42)glyph+=ABOVE[Math.floor((t*2+c+r)%ABOVE.length)];
      if(norm>0.72)glyph+=BELOW[Math.floor((t*1.4+c*2+r)%BELOW.length)];

      const rgb=hsl(114+noise(fx,fy,3)*16+focus*18,18+norm*18,8+norm*28);
      const near=Math.sqrt((fx-pmx)*(fx-pmx)+(fy-pmy)*(fy-pmy));
      if(near<0.07){
        const boost=1-near/0.07;
        rgb[0]=Math.min(255,rgb[0]+boost*36);
        rgb[1]=Math.min(255,rgb[1]+boost*48);
        rgb[2]=Math.min(255,rgb[2]+boost*24);
      }

      ctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
      ctx.fillText(glyph,c*cw,r*ch);
    }
  }

  requestAnimationFrame(draw);
}

document.addEventListener('mousemove',e=>{
  mx=e.clientX/W;
  my=e.clientY/H;
});

document.addEventListener('touchmove',e=>{
  const touch=e.touches[0];
  if(!touch)return;
  mx=touch.clientX/W;
  my=touch.clientY/H;
},{passive:true});

window.addEventListener('resize',resize);
resize();
draw();
</script>
</body>
</html>
