<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<style>
*{margin:0;padding:0}
body{background:#000;overflow:hidden;touch-action:none;cursor:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');

const CELL=18;
const CW=CELL*0.56;
let W,H,cols,rows,centerCol;
let mx=0.5,my=0.5,pmx=0.5,pmy=0.5;
let t=0;
let scrollY=0,targetScrollY=0;
let click=0,clickVR=0,clickVC=0;

// persistence map - cells stay bright after mouse passes
let persist=null;
function initPersist(){persist=new Float32Array(cols*rows);}

const CH={
  cave:    '░▒▓█▓▒░░▒▓██▓▒',
  cunei:   '𒀀𒁀𒂀𒃀𒄀𒅀𒆀𒇀𒈀𒉀𒊀',
  manuscript:'❧✦❦☙✠✝✤✥✧❖✣',
  press:   '▌█▐▌█▐▌▀▄█▐▌',
  concrete:'  · ∘ ○ ◌  · ',
  typewr:  '@#$%&()_=+~|',
  telegraph:'·─·──···─·─··',
  bauhaus: '■▲●◆═╬▬□△○◇',
  fluxus:  'ABCDEFGHIJKLMNOP',
  compart: '╱╲╳╱╲╳│─┼╱╲╳',
  ascii:   '/\\|_-=+<>[]{}()',
  demo:    '►◄▸◂0123456789AF',
  netart:  '<>/\\{}()[]#&;="',
  glitch:  '█̷░̸▓̶▒̴█̷░̸▓̶▒̴█̷░̸',
  circuit: '─┤├)(┬⏚+│┼─┤',
  livecode:'(){}[];=>+-*/%',
  noise:   '·∙.·∙:·∙.·∙:',
};

const COL=[
  [200,100,50],   // cave: warm ochre
  [210,180,110],  // cuneiform: clay
  [200,160,70],   // manuscript: gold
  [170,170,170],  // press: lead
  [255,255,255],  // concrete: white
  [160,150,130],  // typewriter: worn metal
  [80,200,255],   // telegraph: electric blue
  [255,20,60],    // bauhaus: hard red
  [255,255,210],  // fluxus: warm paper
  [0,255,140],    // computer art: phosphor green
  [0,220,255],    // ascii: terminal cyan
  [255,255,0],    // demo: screaming yellow
  [255,0,200],    // netart: hot magenta
  [255,50,0],     // glitch: burn red
  [255,210,0],    // circuit: solder gold
  [0,255,200],    // livecode: matrix green
];

const SPINE='│┃║│┃║│┃│║┃│';

const eras=[];
function era(id,title,year,glyph,desc,thread){
  eras.push({id,title,year,glyph,desc,thread,lines:[]});
  const e=eras[eras.length-1];
  let r=0;
  e.lines.push([r,0,'◆── '+year,'date']);r+=2;
  // title gets special flag
  e.lines.push([r,0,title,'title']);r+=2;
  const gl=glyph.split('\n');
  for(const g of gl){e.lines.push([r,0,g,'glyph']);r++;}
  r++;
  const dl=desc.split('\n');
  for(const d of dl){e.lines.push([r,0,d,'text']);r++;}
  r++;
  const tl=thread.split('\n');
  for(const tt of tl){e.lines.push([r,0,tt,'thread']);r++;}
  r+=3;
  e.height=r;
}

era('cave','CAVE PAINTING','~40,000 BCE',
`          ░
       ░▒░▓
    ░▒▓█▓▒░░
       ▒▓▓▒░
          ░`,
`the wall is not blank.
a bulge becomes a bison shoulder.
a crack becomes the horizon.
the rock collaborates.

pigment blown through bone tubes
onto limestone that curves on its own terms.
they USED those curves.

the artifact of the substrate is signal.
not noise. this is already glitch thinking.`,
`→ the medium pushes back. the image is negotiation.`);

era('cunei','CUNEIFORM','~3400 BCE',
`     𒀀  𒁀  𒂀  𒃀  𒄀  𒅀`,
`the first abstraction.
the mark stops depicting. starts representing.

the SHAPE is pure physics:
what a cut reed does in soft earth.

the tool's body determines the symbol's body.
same thing that makes pixel art
look like pixel art.

hardware-determined aesthetics.
it never stopped being this.`,
`→ the tool's physics dictates the symbol's form.`);

era('manuscript','ILLUMINATED MANUSCRIPTS','~600 CE',
`        ❧ ✦ ❦ ☙ ✠ ❧ ✦`,
`hand-copied code.
character by character.

errors PRESERVED not corrected.
the mistake becomes the record.

ligatures, ornamental capitals:
functional compression
that becomes beautiful.

lossy encoding. 600 CE.`,
`→ the error preserved. function becomes ornament.`);

era('press','PRINTING PRESS','1440',
`   ▌█▐ ▌█▐ ▌█▐ ▌█▐ ▌█▐ ▌█▐`,
`fixed rectangular blocks on a grid.
the first pixel matrix.
gutenberg's bitmap.

IMMEDIATELY people do two things:
  use it correctly
  push against it aesthetically

that split between correct use
and subversion of the same system
runs through everything that follows.`,
`→ the grid. correct use vs subversion. the only split.`);

era('concrete','CONCRETE POETRY','~1897',
`              w
             o r
            d s a
             r e
              s
            h a p
             e s`,
`mallarme shatters the page grid.
white space becomes content.

breaks gutenberg FROM WITHIN.
using its own medium
against its own conventions.

the word is simultaneously:
  meaning
  visual object
  spatial event

code poetry's direct ancestor.`,
`→ breaking the grid from within. space as content.`);

era('typewr','TYPEWRITER ART','~1898',
`          ____
         /    \\
        | .  . |
        |  \\/  |
         \\____/
        ===##===`,
`flora stacey's butterfly.
a text machine forced to make images.

the character set IS the palette.
its limitations ARE the rules.

the constraint generates the form.
the constraint IS the form.`,
`→ forcing a system past its design.`);

era('telegraph','TELEGRAPH / SIGNAL','~1830s',
`   ·· ─── ·─· ─ ··· ─── ··─·`,
`information transmitted. not inscribed.

first time the medium introduces
its OWN artifacts:

  noise
  crosstalk
  signal degradation
  the ghost in the wire

the failure mode of communication
becomes aesthetically charged.
this never goes away.`,
`→ transmission introduces artifact. noise is born.`);

era('bauhaus','BAUHAUS / CONSTRUCTIVISM','1919',
`      ■ ═══ ▲ ═══ ● ═══ ◆`,
`the grid isn't just layout.
it's a worldview.

strip ornament. reveal structure.
typography as architecture.

feeds directly into computer graphics
and the modernist assumptions that
net artists will deliberately smash.

build the temple
before you desecrate it.`,
`→ the grid as ideology. setting up the break.`);

era('fluxus','FLUXUS / MAIL ART','1960s',
`
   INSTRUCTION:

   light a match.
   watch it
   until it goes out.
`,
`art reduced to executable instruction.
the SOURCE CODE of an experience.

mail art: postal system as protocol.
envelope as interface.
ray johnson = P2P networking
decades before TCP/IP.

the artwork is the transmission.
not the object.`,
`→ art as instruction set. network as medium.`);

era('compart','EARLY COMPUTER ART','1960s',
`      ╱╲╱╲╱╲╱╲╱╲
      ╲╱╲╱╲╱╲╱╲╱
      ╱╲╱╲    ╱╲╱╲
      ╲╱╲╱    ╲╱╲╱
      ╱╲╱╲╱╲╱╲╱╲
      ╲╱╲╱╲╱╲╱╲╱`,
`vera molnar. frieder nake.
the algorithm as collaborator.

the machine accesses forms
she couldn't have imagined alone.

plotter drawings: negotiations between
instruction and execution.

the machine isn't a tool.
it's a collaborator with tendencies.

the loop back to the cave wall
is explicit.`,
`→ machine as collaborator. the cave wall returns.`);

era('ascii','ASCII / ANSI / PETSCII','1960s-90s',
`        /\\___/\\
       ( o   o )
       (  =^=  )
        )     (
       (       )`,
`the character set IS the palette.
95 printable characters.
infinite images.

ACiD. iCE. the BBS underground.
16 colors. 256 characters.
genuinely stunning work from nothing.

the art exists BECAUSE of the constraint.
same energy as building instruments
from salvaged components.`,
`→ constraint as generative force.`);

era('demo','DEMOSCENE','1980s',
`   >>>  6 4 K  <<<  >>>  4 K  <<<`,
`sixty-four kilobytes.
make the impossible.

every byte is contested territory.
the entire practice = negotiation
with the machine's limits.

purest constraint-as-medium since
five pigments and a bone tube.

scarcity as creative engine.
it was never about abundance.`,
`→ limitation IS the generative force.`);

era('netart','NET.ART','1990s',
` <A HREF="">████████</A>
 <BR><BR><BR>
 <FRAME SRC="void">
 </FRAMESET>`,
`JODI. olia lialina. heath bunting.
the browser is the canvas.
HTML is the paint.

what the machine does UNDERNEATH
the user-friendly surface.

peel back the interface.
show infrastructure.
reveal the machinery.
reveal the machinery.`,
`→ revealing infrastructure. network as material.`);

era('glitch','GLITCH ART','2000s',
` █̷̗̘̀́▒̸̨̛̜̝▓̶̢̗̘░̴̧̛̗̘█̷̗̘̀́▒̸̨̛̜̝▓̶̢̗̘░̴̧̛̗̘█̷̗̘̀́▒̸̨̛̜̝`,
`the codec's logic made visible.
the compression artifact was always there.
glitch refuses to hide it.

datamosh: remove keyframes.
see what's underneath.
hex edit: rewrite the file's body.

the cave painter used the rock's bump.
the glitch artist uses JPEG blocks.

the loop closes.`,
`→ artifact as signal. back to the cave wall.`);

era('circuit','CIRCUIT BENDING','2000s',
`  +5V──┤├──⏚──)(──┬──GND
                    │
                 [VOICE]`,
`the salvaged component has its own voice.
short-circuit as composition.

not broken. REVEALED.

this collapses the entire timeline:
  cave     = material's properties
  typewriter = forced past design
  glitch   = failure as content

all three. simultaneously.
voltage and solder. physical.`,
`→ the timeline collapses into solder and voltage.`);

era('livecode','LIVE CODING','2010s',
`  d1 $ s "bd sn"
     # speed 0.9
     |+ n "<0 3 7 12>"
     # room 0.4`,
`the code IS the performance.
the algorithm IS the instrument.
source projected. audience watches.

  fluxus    = score as art
  demoscene = beauty from constraint
  net.art   = source as material

every typo is a glitch.
every bug is a feature.
the negotiation made visible.`,
`→ code as score. the negotiation IS the performance.`);

// HEADER as virtual content
const headerLines=[
  [0, 'T H E   L I N E'],
  [2, 'from cave wall to broken pixel'],
  [4, '·····································'],
  [6, '↕ scroll to traverse'],
  [7, '◎ proximity reveals'],
];

// compute layout
let totalRows=12;
for(const e of eras){e.startRow=totalRows;totalRows+=e.height;}
totalRows+=10;

// footer
const footerStart=totalRows;
const footerLines=[
  [0, '·····································'],
  [2, 'the medium resists.'],
  [3, 'the artist negotiates.'],
  [4, 'the failure becomes the work.'],
  [6, 'this has never changed.'],
];
totalRows+=10;

// BUILD content map: vrow -> array of {col, ch, eraIdx, type}
let content=null;
function buildContent(){
  content=new Map();
  // header
  for(const [r,text] of headerLines){
    if(!content.has(r))content.set(r,[]);
    const row=content.get(r);
    const startC=centerCol-Math.floor(text.length/2);
    for(let i=0;i<text.length;i++){
      row.push({col:startC+i,ch:text[i],era:-1,type:r===0?'bigtitle':'dim'});
    }
  }
  // eras
  for(let ei=0;ei<eras.length;ei++){
    const e=eras[ei];
    for(const [lr,_off,text,type] of e.lines){
      const vr=e.startRow+lr;
      if(!content.has(vr))content.set(vr,[]);
      const row=content.get(vr);
      // center text block: anchor at centerCol-2 (offset left to give room)
      const anchor=centerCol-4;
      for(let i=0;i<text.length;i++){
        row.push({col:anchor+i,ch:text[i],era:ei,type});
      }
    }
  }
  // footer
  for(const [r,text] of footerLines){
    const vr=footerStart+r;
    if(!content.has(vr))content.set(vr,[]);
    const row=content.get(vr);
    const startC=centerCol-Math.floor(text.length/2);
    for(let i=0;i<text.length;i++){
      row.push({col:startC+i,ch:text[i],era:-1,type:'footer'});
    }
  }
}

function maxScroll(){return Math.max(0,(totalRows-rows+4)*CELL);}

// tears
let tears=[];
function updateTears(){
  if(Math.random()<0.04)tears.push({
    y:Math.floor(Math.random()*rows),
    life:3+Math.random()*5,
    offset:Math.floor(Math.random()*10-5),
    thick:1+Math.floor(Math.random()*2)
  });
  tears=tears.filter(t=>(t.life-=0.1)>0);
}

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W;cv.height=H;
  cols=Math.floor(W/CW);
  rows=Math.floor(H/CELL);
  centerCol=Math.floor(cols/2);
  ctx.textBaseline='top';
  initPersist();
  buildContent();
}

function getEraAt(vr){
  for(let i=0;i<eras.length;i++){
    if(vr>=eras[i].startRow&&vr<eras[i].startRow+eras[i].height)return i;
  }
  return -1;
}

function frame(){
  t+=0.012;
  updateTears();
  if(click>0)click*=0.93;

  scrollY+=(targetScrollY-scrollY)*0.1;
  pmx+=(mx-pmx)*0.08;
  pmy+=(my-pmy)*0.08;

  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  const scrollRow=scrollY/CELL;
  const mVR=pmy*rows+scrollRow;
  const mVC=pmx*cols;

  // tear lookup
  const tearSet=new Set();
  const tearOff={};
  for(const tr of tears){
    for(let dy=0;dy<tr.thick;dy++){
      tearSet.add(tr.y+dy);tearOff[tr.y+dy]=tr.offset;
    }
  }

  // shockwave
  const shockRad=click>0.01?(1-click)*40:0;

  // decay persistence
  for(let i=0;i<persist.length;i++){
    persist[i]*=0.97;
  }

  // update persistence near mouse
  const mScreenR=Math.floor(pmy*rows);
  const mScreenC=Math.floor(pmx*cols);
  for(let dr=-12;dr<=12;dr++){
    for(let dc=-20;dc<=20;dc++){
      const r=mScreenR+dr,c=mScreenC+dc;
      if(r<0||r>=rows||c<0||c>=cols)continue;
      const dist=Math.sqrt(dr*dr+(dc*0.45)*(dc*0.45));
      if(dist<12){
        const v=Math.max(0,1-dist/12);
        const idx=r*cols+c;
        if(v>persist[idx])persist[idx]=v;
      }
    }
  }

  ctx.font='bold '+CELL+'px Courier New, monospace';

  for(let r=0;r<rows;r++){
    const vr=Math.floor(r+scrollRow);
    const isTear=tearSet.has(r);
    const tOff=isTear?(tearOff[r]||0):0;
    const eraIdx=getEraAt(vr);
    const rowContent=content.get(vr);

    // build column lookup for this row
    const colMap={};
    if(rowContent){
      for(const item of rowContent){
        colMap[item.col]=item;
      }
    }

    for(let c=0;c<cols;c++){
      const dc=c+tOff;
      if(dc<0||dc>=cols)continue;

      const item=colMap[c]||null;

      // spine: thin line down center
      const isSpine=(c===centerCol-5)&&eraIdx>=0&&!item;

      const pIdx=r*cols+c;
      const p=persist[pIdx]||0;

      // live distance
      const dr=r+scrollRow-mVR;
      const dcc=(c-mVC)*0.45;
      const dist=Math.sqrt(dr*dr+dcc*dcc);
      const resolve=Math.max(p,Math.max(0,1-dist/14));

      // shockwave
      let shockHit=false;
      if(shockRad>0){
        const sdr=(r+scrollRow)-clickVR;
        const sdc=(c-clickVC)*0.45;
        const sd=Math.sqrt(sdr*sdr+sdc*sdc);
        if(Math.abs(sd-shockRad)<2.5)shockHit=true;
      }

      let ch=' ';
      let col=[0,0,0];

      if(isSpine){
        const si=Math.abs(Math.floor(t*2+vr))%SPINE.length;
        ch=SPINE[si];
        const pulse=0.15+Math.sin(t*2+vr*0.3)*0.05;
        if(eraIdx>=0){
          const ec=COL[eraIdx];
          col=[ec[0]*pulse|0,ec[1]*pulse|0,ec[2]*pulse|0];
        }else{
          col=[30,30,30];
        }
      }else if(item){
        const ei=item.era>=0?item.era:0;
        const eCol=item.era>=0?COL[ei]:[150,150,150];
        const eChars=item.era>=0?(CH[eras[ei].id]||CH.noise):CH.noise;

        // type-based brightness boost
        let baseBright=0.5;
        if(item.type==='title')baseBright=0.8;
        if(item.type==='date')baseBright=0.7;
        if(item.type==='bigtitle')baseBright=1.0;
        if(item.type==='thread')baseBright=0.6;
        if(item.type==='dim')baseBright=0.4;
        if(item.type==='footer')baseBright=0.5;

        if(item.ch===' '){
          // space: sparse noise
          if(Math.random()<0.015&&resolve<0.4){
            ch=eChars[Math.floor(Math.random()*eChars.length)];
            col=[eCol[0]*0.06|0,eCol[1]*0.06|0,eCol[2]*0.06|0];
          }
        }else if(resolve>0.35||shockHit){
          // resolved
          ch=item.ch;
          const bright=baseBright*(.6+resolve*.4);
          col=[eCol[0]*bright|0,eCol[1]*bright|0,eCol[2]*bright|0];
          // micro-flicker at edges of resolve
          if(resolve<0.5&&Math.random()<0.08){
            ch=eChars[Math.floor(Math.random()*eChars.length)];
          }
        }else if(resolve>0.08){
          // flickering
          if(Math.random()<resolve*2){
            ch=item.ch;
          }else{
            ch=eChars[Math.floor(Math.random()*eChars.length)];
          }
          const bright=0.1+resolve*0.5;
          col=[eCol[0]*bright|0,eCol[1]*bright|0,eCol[2]*bright|0];
        }else{
          // noise
          if(Math.random()<0.12){
            ch=eChars[Math.floor(Math.random()*eChars.length)];
            col=[eCol[0]*0.05|0,eCol[1]*0.05|0,eCol[2]*0.05|0];
          }
        }
      }else{
        // background noise
        if(eraIdx>=0&&Math.random()<0.006){
          const eChars=CH[eras[eraIdx].id]||CH.noise;
          const eCol=COL[eraIdx];
          ch=eChars[Math.floor(Math.random()*eChars.length)];
          const flicker=0.03+Math.sin(t*3+c*0.7+r*0.5)*0.01;
          col=[eCol[0]*flicker|0,eCol[1]*flicker|0,eCol[2]*flicker|0];
        }else if(Math.random()<0.002){
          ch=CH.noise[Math.floor(Math.random()*CH.noise.length)];
          col=[15,15,15];
        }
      }

      // tear
      if(isTear&&ch!==' '){
        col=[255-col[0],255-col[1],255-col[2]];
        if(Math.random()<0.3){
          ch='@#$%&!?'[Math.floor(Math.random()*7)];
        }
      }

      // shockwave flash
      if(shockHit&&ch!==' '){col=[255,255,255];}

      // edge fade
      const edgeDist=Math.min(r,rows-r-1);
      if(edgeDist<4&&ch!==' '){
        const f=edgeDist/4;
        col=[col[0]*f|0,col[1]*f|0,col[2]*f|0];
      }

      if(ch!==' '){
        ctx.fillStyle=`rgb(${col[0]},${col[1]},${col[2]})`;
        ctx.fillText(ch,dc*CW,r*CELL);
      }
    }
  }

  // era dots on spine
  for(let ei=0;ei<eras.length;ei++){
    const e=eras[ei];
    const sr=e.startRow-scrollRow;
    if(sr<-3||sr>rows+3)continue;
    const ec=COL[ei];
    const pulse=0.6+Math.sin(t*2+ei)*0.4;
    ctx.fillStyle=`rgb(${ec[0]*pulse|0},${ec[1]*pulse|0},${ec[2]*pulse|0})`;
    ctx.fillText('◆',(centerCol-5)*CW,sr*CELL);
  }

  // cursor
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fillText('┼',mx*W-CW*0.5,my*H-CELL*0.4);

  // scroll track
  if(maxScroll()>0){
    const pct=scrollY/maxScroll();
    const indR=Math.floor(pct*(rows-6))+3;
    ctx.fillStyle='#222';
    for(let r=3;r<rows-3;r++){
      ctx.fillText('·',(cols-3)*CW,r*CELL);
    }
    ctx.fillStyle='#aaa';
    ctx.fillText('█',(cols-3)*CW,indR*CELL);
  }

  requestAnimationFrame(frame);
}

document.addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H});
document.addEventListener('touchmove',e=>{
  e.preventDefault();mx=e.touches[0].clientX/W;my=e.touches[0].clientY/H;
},{passive:false});
document.addEventListener('click',e=>{
  click=1;clickVR=my*rows+scrollY/CELL;clickVC=mx*cols;
});
document.addEventListener('wheel',e=>{
  e.preventDefault();
  targetScrollY=Math.max(0,Math.min(maxScroll(),targetScrollY+e.deltaY*2));
  if(Math.abs(e.deltaY)>8){
    for(let i=0;i<2;i++)tears.push({
      y:Math.floor(Math.random()*rows),
      life:4+Math.random()*5,
      offset:Math.floor(Math.random()*12-6),
      thick:1+Math.floor(Math.random()*3)
    });
  }
},{passive:false});

let touchY=0;
document.addEventListener('touchstart',e=>{touchY=e.touches[0].clientY});
document.addEventListener('touchmove',e=>{
  const dy=touchY-e.touches[0].clientY;touchY=e.touches[0].clientY;
  targetScrollY=Math.max(0,Math.min(maxScroll(),targetScrollY+dy*2.5));
},{passive:false});

window.addEventListener('resize',resize);
resize();
frame();
</script>
</body>
</html>
