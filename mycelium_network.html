<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0}
body{background:#06050a;overflow:hidden;cursor:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const CELL=10;
let W,H,cols,rows;
let trail,age,dir,density,pulse;
let mx=0.5,my=0.5;
let t=0;
let hyphae=[];
let actx,masterGain,grainBus,nodeBus,bedGain,audioReady=false;
let noiseBuffer,nextGrainTime=0,lastNodeVoice=0;
let bedOscA,bedOscB,bedLfo;
let prevPulseNorm=0,prevNodeNorm=0,audioPan=0;

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function buildNoiseBuffer(){
  const len=actx.sampleRate*2;
  noiseBuffer=actx.createBuffer(1,len,actx.sampleRate);
  const data=noiseBuffer.getChannelData(0);
  let prev=0;
  for(let i=0;i<len;i++){
    prev=prev*0.94+(Math.random()*2-1)*0.18;
    data[i]=prev;
  }
}

function initAudio(){
  actx=new (window.AudioContext||window.webkitAudioContext)();
  masterGain=actx.createGain();
  masterGain.gain.value=0.22;

  const comp=actx.createDynamicsCompressor();
  comp.threshold.value=-26;
  comp.knee.value=18;
  comp.ratio.value=4;
  comp.attack.value=0.01;
  comp.release.value=0.22;

  grainBus=actx.createGain();
  grainBus.gain.value=0.22;
  nodeBus=actx.createGain();
  nodeBus.gain.value=0.18;
  bedGain=actx.createGain();
  bedGain.gain.value=0.02;

  grainBus.connect(masterGain);
  nodeBus.connect(masterGain);
  masterGain.connect(comp);
  comp.connect(actx.destination);

  buildNoiseBuffer();

  const bedFilter=actx.createBiquadFilter();
  bedFilter.type='lowpass';
  bedFilter.frequency.value=420;
  bedFilter.Q.value=0.4;
  bedFilter.connect(bedGain);
  bedGain.connect(masterGain);

  bedOscA=actx.createOscillator();
  bedOscA.type='triangle';
  bedOscA.frequency.value=58;
  bedOscB=actx.createOscillator();
  bedOscB.type='sine';
  bedOscB.frequency.value=91;
  bedLfo=actx.createOscillator();
  bedLfo.type='sine';
  bedLfo.frequency.value=0.07;
  const lfoGain=actx.createGain();
  lfoGain.gain.value=8;
  bedLfo.connect(lfoGain);
  lfoGain.connect(bedOscB.detune);

  bedOscA.connect(bedGain);
  bedOscB.connect(bedFilter);
  bedOscA.start();
  bedOscB.start();
  bedLfo.start();

  nextGrainTime=actx.currentTime+0.06;
  lastNodeVoice=0;
  audioReady=true;
}

function bootAudio(){
  try{
    if(!actx)initAudio();
    if(actx.state!=='running')actx.resume();
  }catch(err){
    audioReady=false;
  }
}

function scheduleNoiseGrain(at,freq,dur,amp,pan){
  if(!audioReady||!noiseBuffer)return;
  const src=actx.createBufferSource();
  src.buffer=noiseBuffer;
  src.playbackRate.value=clamp(freq/320,0.35,2.4);

  const filter=actx.createBiquadFilter();
  filter.type='bandpass';
  filter.frequency.value=freq;
  filter.Q.value=clamp(3+freq/120,3,12);

  const gain=actx.createGain();
  gain.gain.setValueAtTime(0,at);
  gain.gain.linearRampToValueAtTime(amp,at+Math.min(0.018,dur*0.35));
  gain.gain.exponentialRampToValueAtTime(0.0001,at+dur);

  src.connect(filter);
  filter.connect(gain);

  if(actx.createStereoPanner){
    const p=actx.createStereoPanner();
    p.pan.value=pan;
    gain.connect(p);
    p.connect(grainBus);
  }else{
    gain.connect(grainBus);
  }

  const maxOffset=Math.max(0,noiseBuffer.duration-dur-0.01);
  src.start(at,Math.random()*maxOffset,dur);
  src.stop(at+dur+0.02);
}

function scheduleNodeBloom(at,freq,amp,pan){
  if(!audioReady)return;
  const osc=actx.createOscillator();
  osc.type='triangle';
  osc.frequency.value=freq;
  const sub=actx.createOscillator();
  sub.type='sine';
  sub.frequency.value=freq*0.5;

  const filter=actx.createBiquadFilter();
  filter.type='lowpass';
  filter.frequency.value=freq*3.4;
  filter.Q.value=0.7;

  const gain=actx.createGain();
  gain.gain.setValueAtTime(0.0001,at);
  gain.gain.linearRampToValueAtTime(amp,at+0.04);
  gain.gain.exponentialRampToValueAtTime(0.0001,at+0.42);

  osc.connect(filter);
  sub.connect(filter);
  filter.connect(gain);

  if(actx.createStereoPanner){
    const p=actx.createStereoPanner();
    p.pan.value=pan;
    gain.connect(p);
    p.connect(nodeBus);
  }else{
    gain.connect(nodeBus);
  }

  osc.start(at);
  sub.start(at);
  osc.stop(at+0.48);
  sub.stop(at+0.48);
}

function triggerSporeBurst(sx,sy){
  if(!audioReady)return;
  const now=actx.currentTime+0.01;
  const pan=clamp(sx*2-1,-0.9,0.9);
  const base=170+sy*230+Math.random()*70;
  for(let i=0;i<3;i++){
    scheduleNoiseGrain(now+i*0.024,base+i*55,0.08+i*0.015,0.026-i*0.005,pan+(Math.random()-0.5)*0.35);
  }
  scheduleNodeBloom(now+0.02,base*0.66,0.028,pan*0.7);
}

function triggerPulseCrackle(strength,pan,cy){
  if(!audioReady)return;
  const now=actx.currentTime+0.01;
  const count=3+Math.floor(strength*6);
  const base=210+(1-cy)*240+strength*140;
  for(let i=0;i<count;i++){
    const at=now+i*(0.008+Math.random()*0.014);
    const freq=base+Math.random()*260+(i%2)*70;
    const dur=0.022+Math.random()*0.04;
    const amp=0.01+strength*0.016-Math.min(i*0.0012,0.006);
    scheduleNoiseGrain(at,freq,dur,amp,clamp(pan+(Math.random()-0.5)*0.55,-1,1));
  }
}

function updateAudio(stats){
  if(!audioReady||!actx)return;
  const now=actx.currentTime;
  const cells=Math.max(1,cols*rows);
  const growth=clamp(stats.liveCells/(cells*0.06),0,1);
  const nodes=clamp(stats.nodeCells/120,0,1);
  const tips=clamp(stats.tipCells/90,0,1);
  const pulses=clamp(stats.pulseEnergy/240,0,1);
  const centerX=stats.weight>0?stats.sumX/stats.weight:0.5;
  const centerY=stats.weight>0?stats.sumY/stats.weight:0.5;
  const branchiness=clamp(stats.branchCells/220,0,1);
  const freshness=clamp(stats.freshEnergy/180,0,1);
  const activity=clamp(growth*0.28+tips*0.2+nodes*0.14+pulses*0.2+branchiness*0.18,0,1);
  const pulseRise=Math.max(0,pulses-prevPulseNorm);
  const nodeRise=Math.max(0,nodes-prevNodeNorm);
  audioPan+=(centerX*2-1-audioPan)*0.14;

  bedGain.gain.setTargetAtTime(0.005+growth*0.012+nodes*0.018,now,0.35);
  grainBus.gain.setTargetAtTime(0.14+activity*0.28+pulses*0.12+freshness*0.08,now,0.12);
  nodeBus.gain.setTargetAtTime(0.08+nodes*0.18+branchiness*0.05,now,0.2);
  masterGain.gain.setTargetAtTime(0.17+growth*0.06+nodes*0.06+pulses*0.04,now,0.22);

  bedOscA.frequency.setTargetAtTime(46+(1-centerY)*18+growth*22+nodes*12,now,0.28);
  bedOscB.frequency.setTargetAtTime(78+(1-centerY)*34+growth*48+pulses*24,now,0.22);

  if(now>=nextGrainTime){
    const grains=2+Math.floor(activity*2)+Math.floor(pulses*2)+(Math.random()<branchiness*0.7?1:0);
    for(let i=0;i<grains;i++){
      const spread=(Math.random()-0.5)*(0.3+branchiness*0.9);
      const freq=120+(1-centerY)*160+growth*110+nodes*170+pulses*180+freshness*120+Math.random()*150;
      const dur=0.018+tips*0.026+branchiness*0.016+Math.random()*0.016;
      const amp=0.008+activity*0.012+pulses*0.006+freshness*0.006;
      scheduleNoiseGrain(now+i*(0.006+Math.random()*0.01),freq,dur,amp,clamp(audioPan+spread,-1,1));
    }
    nextGrainTime=now+clamp(0.19-activity*0.085-pulses*0.05-branchiness*0.04,0.035,0.19);
  }

  if((nodes>0.1||pulses>0.18)&&now-lastNodeVoice>0.28-nodes*0.1){
    if(Math.random()<0.1+nodes*0.2+pulses*0.16+nodeRise*1.8){
      scheduleNodeBloom(now+0.01,98+(1-centerY)*52+nodes*120+Math.random()*60,0.018+nodes*0.036+pulses*0.014,clamp(audioPan*0.7+(Math.random()-0.5)*0.35,-0.8,0.8));
      lastNodeVoice=now;
    }
  }

  if(pulseRise>0.025||nodeRise>0.018){
    triggerPulseCrackle(clamp(pulseRise*5+nodeRise*6+pulses*0.4,0.18,1),audioPan,centerY);
  }

  prevPulseNorm+=(pulses-prevPulseNorm)*0.3;
  prevNodeNorm+=(nodes-prevNodeNorm)*0.26;
}

// directional line-drawing characters
const HDIR={
  0:'\u2500',1:'\u2571',2:'\u2502',3:'\u2572',
  4:'\u2500',5:'\u2571',6:'\u2502',7:'\u2572'
};
const BRANCH='\u251C\u2524\u252C\u2534\u253C\u256C\u2560\u2563';
const ALIVE='\u2219\u2022\u25CF\u25C9\u25CE';
const SPORE='\u00B7\u2027\u2059\u205A\u205B';
const DECAY='\u2591\u2592\u2593\u2588\u2593\u2592\u2591';
const FRUIT='\u2740\u2741\u273F\u2744\u2746\u2749\u274B';
const NODE='\u25C6\u25C7\u2B22\u2B23\u2726\u2727\u2728\u2729';

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W;cv.height=H;
  cols=Math.floor(W/(CELL*0.58));
  rows=Math.floor(H/CELL);
  const sz=cols*rows;
  trail=new Float32Array(sz);
  age=new Float32Array(sz);
  dir=new Int8Array(sz).fill(-1);
  density=new Float32Array(sz);
  pulse=new Float32Array(sz);
  ctx.font=CELL+'px Courier New';
  ctx.textBaseline='top';
  hyphae=[];
  // initial spores
  for(let i=0;i<12;i++) spawnSpore(Math.random(),Math.random());
}

function spawnSpore(sx,sy){
  const count=3+Math.floor(Math.random()*5);
  for(let i=0;i<count;i++){
    hyphae.push({
      x:sx*cols,
      y:sy*rows,
      angle:Math.random()*Math.PI*2,
      energy:120+Math.random()*200,
      speed:0.3+Math.random()*0.4,
      branchProb:0.008+Math.random()*0.012,
      age:0,
      gen:0
    });
  }
  // mark origin
  const gc=Math.floor(sx*cols),gr=Math.floor(sy*rows);
  if(gc>=0&&gc<cols&&gr>=0&&gr<rows){
    const idx=gr*cols+gc;
    density[idx]=10;
    trail[idx]=5;
  }
}

function frame(){
  t+=0.02;
  const cw=CELL*0.58;
  const mxg=mx*cols,myg=my*rows;

  // GROW HYPHAE
  const newHyphae=[];
  for(let h=0;h<hyphae.length;h++){
    const hy=hyphae[h];
    if(hy.energy<=0)continue;
    hy.age++;
    hy.energy-=0.4;

    // chemotaxis: bend toward mouse
    const dx=mxg-hy.x,dy=myg-hy.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>1){
      const targetAngle=Math.atan2(dy,dx);
      let diff=targetAngle-hy.angle;
      while(diff>Math.PI)diff-=2*Math.PI;
      while(diff<-Math.PI)diff+=2*Math.PI;
      const attraction=Math.min(0.08,2/dist);
      hy.angle+=diff*attraction;
    }

    // random wander
    hy.angle+=( Math.random()-0.5)*0.6;

    // avoid edges gently
    if(hy.x<3)hy.angle+= 0.1;
    if(hy.x>cols-3)hy.angle-=0.1;
    if(hy.y<3)hy.angle=Math.abs(hy.angle)<Math.PI/2?hy.angle:hy.angle+0.1;
    if(hy.y>rows-3)hy.angle+=-0.1;

    // follow existing trails slightly (stigmergy)
    const lookX=Math.floor(hy.x+Math.cos(hy.angle)*2);
    const lookY=Math.floor(hy.y+Math.sin(hy.angle)*2);
    if(lookX>=0&&lookX<cols&&lookY>=0&&lookY<rows){
      const li=lookY*cols+lookX;
      if(trail[li]>0.5&&density[li]<3){
        hy.angle+=(Math.random()-0.5)*0.3;
        hy.energy+=0.2;
      }
    }

    // move
    hy.x+=Math.cos(hy.angle)*hy.speed;
    hy.y+=Math.sin(hy.angle)*hy.speed;

    const gc=Math.floor(hy.x),gr=Math.floor(hy.y);
    if(gc<0||gc>=cols||gr<0||gr>=rows){hy.energy=0;continue;}

    const idx=gr*cols+gc;
    
    // deposit trail
    trail[idx]=Math.min(trail[idx]+1.2,8);
    age[idx]=0;
    density[idx]+=0.15;

    // direction for character selection
    const d8=Math.round(((hy.angle%(2*Math.PI))+(2*Math.PI))%(2*Math.PI)/(Math.PI/4))%8;
    dir[idx]=d8;

    // fusion: hitting dense area = create node, die, release energy
    if(density[idx]>4&&hy.age>20){
      density[idx]+=3;
      trail[idx]=8;
      pulse[idx]=3;
      hy.energy=0;
      // spawn new directions from node
      if(hyphae.length+newHyphae.length<2000){
        for(let b=0;b<2;b++){
          newHyphae.push({
            x:hy.x,y:hy.y,
            angle:hy.angle+Math.PI/2*(b===0?1:-1)+Math.random()*0.5,
            energy:60+Math.random()*60,
            speed:0.25+Math.random()*0.3,
            branchProb:0.006,age:0,gen:hy.gen+1
          });
        }
      }
      continue;
    }

    // branching
    if(Math.random()<hy.branchProb&&hy.energy>30&&hyphae.length+newHyphae.length<2000&&hy.gen<8){
      const side=Math.random()<0.5?1:-1;
      newHyphae.push({
        x:hy.x,y:hy.y,
        angle:hy.angle+side*(0.4+Math.random()*0.8),
        energy:hy.energy*0.4,
        speed:hy.speed*0.85,
        branchProb:hy.branchProb*0.7,
        age:0,gen:hy.gen+1
      });
      hy.energy*=0.7;
    }

    if(hy.energy>0)newHyphae.push(hy);
  }
  hyphae=newHyphae;

  // respawn if population drops
  if(hyphae.length<50&&Math.random()<0.05){
    spawnSpore(Math.random(),Math.random());
  }
  // spawn near mouse occasionally  
  if(Math.random()<0.01){
    spawnSpore(mx+Math.random()*0.05-0.025,my+Math.random()*0.05-0.025);
  }

  // age and decay
  for(let i=0;i<cols*rows;i++){
    age[i]+=0.008;
    trail[i]*=0.997;
    density[i]*=0.999;
    // pulse propagation
    if(pulse[i]>0.1){
      pulse[i]*=0.92;
      // spread to neighbors
      const r2=Math.floor(i/cols),c2=i%cols;
      const spread=pulse[i]*0.02;
      if(c2>0&&trail[i-1]>0.3)pulse[i-1]=Math.max(pulse[i-1],spread);
      if(c2<cols-1&&trail[i+1]>0.3)pulse[i+1]=Math.max(pulse[i+1],spread);
      if(r2>0&&trail[i-cols]>0.3)pulse[i-cols]=Math.max(pulse[i-cols],spread);
      if(r2<rows-1&&trail[i+cols]>0.3)pulse[i+cols]=Math.max(pulse[i+cols],spread);
    }
  }

  // periodic nutrient pulses from nodes
  if(Math.floor(t*10)%30===0){
    for(let i=0;i<cols*rows;i++){
      if(density[i]>5)pulse[i]=Math.max(pulse[i],2);
    }
  }

  // RENDER
  ctx.fillStyle='#06050a';
  ctx.fillRect(0,0,W,H);

  let liveCells=0,nodeCells=0,tipCells=0,pulseEnergy=0,branchCells=0,freshEnergy=0;
  let sumX=0,sumY=0,weight=0;

  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const idx=r*cols+c;
      const v=trail[idx];
      if(v<0.08)continue;

      liveCells++;

      const a=age[idx];
      const d=density[idx];
      const p=pulse[idx];
      const norm=Math.min(v/6,1);
      pulseEnergy+=Math.min(p,1.5);
      if(d>6)nodeCells++;
      else if(d>3)branchCells++;
      if(a<0.05)tipCells++;
      if(a<0.25)freshEnergy+=1-a*2.4;
      const w=norm*(1+p*0.35+(a<0.12?0.8:0)+(d>6?0.55:0));
      sumX+=(c/Math.max(cols-1,1))*w;
      sumY+=(r/Math.max(rows-1,1))*w;
      weight+=w;

      // CHARACTER based on type
      let ch;
      if(d>6){
        // dense node
        ch=NODE[Math.floor((t*2+c*0.3)%NODE.length)];
      }else if(d>3){
        // junction
        ch=BRANCH[Math.floor(d)%BRANCH.length];
      }else if(a<0.05){
        // fresh tip
        ch=ALIVE[Math.floor(norm*ALIVE.length)%ALIVE.length];
      }else if(a>2&&norm<0.3){
        // decaying
        ch=SPORE[Math.floor(a)%SPORE.length];
      }else if(a>3&&Math.random()<0.01){
        // rare fruiting body
        ch=FRUIT[Math.floor(Math.random()*FRUIT.length)];
      }else{
        // normal hypha - directional
        const dd=dir[idx];
        ch=dd>=0?HDIR[dd]:'\u2500';
      }

      // COLOR
      let cr,cg,cb;
      
      if(a<0.1){
        // living tip: bright bioluminescent
        cr=180+p*30;cg=240+p*15;cb=200+p*20;
      }else if(d>5){
        // node: warm amber pulse
        const pp=Math.sin(t*4+c*0.2+r*0.3)*0.3+0.7;
        cr=200*pp+p*40;cg=140*pp+p*20;cb=60*pp+p*30;
      }else if(a<1){
        // young: pale green-blue
        const fade=1-a;
        cr=40+fade*60+p*50;cg=90+fade*100+p*40;cb=80+fade*80+p*35;
      }else if(a<3){
        // mature: muted earth tones
        const fade=1-(a-1)/2;
        cr=60*fade+p*40;cg=50*fade+p*30;cb=35*fade+p*25;
      }else{
        // old: fading to near-black
        const fade=Math.max(0,1-(a-3)/4);
        cr=25*fade+p*20;cg=18*fade+p*15;cb=15*fade+p*12;
      }

      // brightness from trail intensity
      const bright=0.3+norm*0.7;
      cr=Math.min(255,Math.floor(cr*bright));
      cg=Math.min(255,Math.floor(cg*bright));
      cb=Math.min(255,Math.floor(cb*bright));

      if(cr<3&&cg<3&&cb<3)continue;

      ctx.fillStyle=`rgb(${cr},${cg},${cb})`;
      ctx.fillText(ch,c*cw,r*CELL);
    }
  }

  // cursor: spore halo
  const curX=mx*W,curY=my*H;
  const sporeChars='\u00B7\u2219\u2022\u25CF';
  ctx.fillStyle='rgba(180,240,200,0.4)';
  for(let i=0;i<8;i++){
    const a2=t*1.5+i*Math.PI/4;
    const r2=18+Math.sin(t*3+i*1.1)*6;
    ctx.fillText(sporeChars[i%4],curX+Math.cos(a2)*r2-3,curY+Math.sin(a2)*r2-4);
  }
  ctx.fillStyle='rgba(200,255,220,0.7)';
  ctx.fillText('\u2316',curX-4,curY-5);

  if(audioReady)updateAudio({liveCells,nodeCells,tipCells,pulseEnergy,branchCells,freshEnergy,sumX,sumY,weight});

  requestAnimationFrame(frame);
}

document.addEventListener('mousemove',e=>{mx=e.clientX/W;my=e.clientY/H});
document.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX/W;my=e.touches[0].clientY/H},{passive:false});
document.addEventListener('pointerdown',bootAudio);
document.addEventListener('keydown',bootAudio);
document.addEventListener('touchstart',bootAudio,{passive:true});

// click: drop a cluster of spores
document.addEventListener('click',e=>{
  bootAudio();
  const sx=e.clientX/W,sy=e.clientY/H;
  for(let i=0;i<5;i++){
    spawnSpore(sx+(Math.random()-0.5)*0.03,sy+(Math.random()-0.5)*0.03);
  }
  // pulse burst
  const gc=Math.floor(sx*cols),gr=Math.floor(sy*rows);
  for(let dy=-5;dy<=5;dy++){
    for(let dx=-5;dx<=5;dx++){
      const r2=gr+dy,c2=gc+dx;
      if(r2<0||r2>=rows||c2<0||c2>=cols)continue;
      if(Math.sqrt(dx*dx+dy*dy)>5)continue;
      pulse[r2*cols+c2]=3;
    }
  }
  triggerSporeBurst(sx,sy);
});

window.addEventListener('resize',resize);
resize();
frame();
</script>
</body>
</html>
