<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<style>
*{margin:0;padding:0}
body{background:#06050a;overflow:hidden;touch-action:none;cursor:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');

let CELL=13;
let N=1700;
const GOLDEN_ANGLE=Math.PI*(3-Math.sqrt(5));
const PHI=(1+Math.sqrt(5))/2;

let W,H,cols,rows,DPR=1;
let mx=0.5,my=0.5,pmx=0.5,pmy=0.5;
let t=0;
let zoom=1.18;
let targetZoom=1.18;
let energy,depthField,hueField,angleField;
let bx,by,bz,seed;
let pulses=[];
let pinchStart=null;
let touchStartPos=null;
let isTouch=false;

const ABOVE=['\u0300','\u0301','\u0302','\u0303','\u0307','\u0308','\u030A','\u030C','\u0311'];
const BELOW=['\u0323','\u0324','\u0325','\u0330','\u0331','\u0332','\u0347','\u0348'];
const STRIKE=['\u0334','\u0335','\u0336'];

const DUST=['\u00B7','\u2027','\u2219','.','\u2024'];
const THREAD=['\u2500','\u2502','\u2571','\u2572','\u2573','\u254E','\u254F','\u257C','\u257D'];
const WEAVE=['\u2591','\u2592','\u2593','\u25A0','\u25C6','\u25CF','\u25C9'];
const NODES=['\u2740','\u273B','\u2735','\u2749','\u274B','\u2726','\u2728','\u2729'];
const ORBIT=['(',')','[',']','{','}','<','>'];

function initPoints(){
  bx=new Float32Array(N);
  by=new Float32Array(N);
  bz=new Float32Array(N);
  seed=new Float32Array(N);

  for(let i=0;i<N;i++){
    const u=i/(N-1);
    const y=1-u*2;
    const radius=Math.sqrt(Math.max(0,1-y*y));
    const theta=GOLDEN_ANGLE*i;
    bx[i]=Math.cos(theta)*radius;
    by[i]=y;
    bz[i]=Math.sin(theta)*radius;
    seed[i]=theta;
  }
}

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  DPR=Math.max(1,Math.min(window.devicePixelRatio||1,2));
  // adaptive point count + cell size for small screens
  const small=Math.min(W,H)<600;
  const tiny=Math.min(W,H)<420;
  N=tiny?500:(small?800:1700);
  CELL=tiny?12:(small?13:13);
  cv.width=Math.floor(W*DPR);
  cv.height=Math.floor(H*DPR);
  cv.style.width=W+'px';
  cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  cols=Math.floor(W/(CELL*0.58));
  rows=Math.floor(H/CELL);
  energy=new Float32Array(cols*rows);
  depthField=new Float32Array(cols*rows);
  hueField=new Float32Array(cols*rows);
  angleField=new Float32Array(cols*rows);
  ctx.font=CELL+'px Courier New';
  ctx.textBaseline='top';
  initPoints();
}

function hsl(h,s,l){
  const hp=((h%360)+360)%360;
  const sp=s/100,lp=l/100;
  const k=n=>(n+hp/30)%12;
  const a=sp*Math.min(lp,1-lp);
  const f=n=>lp-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1));
  return[
    Math.round(f(0)*255),
    Math.round(f(8)*255),
    Math.round(f(4)*255)
  ];
}

function clearFields(){
  energy.fill(0);
  depthField.fill(-999);
  hueField.fill(0);
  angleField.fill(0);
}

function stampCell(x,y,bright,depthValue,hueValue,angleValue){
  if(x<0||x>=cols||y<0||y>=rows)return;
  const idx=y*cols+x;
  if(depthValue>depthField[idx]){
    depthField[idx]=depthValue;
    hueField[idx]=hueValue;
    angleField[idx]=angleValue;
    energy[idx]=Math.max(energy[idx]*0.55,bright);
  }else{
    energy[idx]+=bright*0.2;
  }
}

function drawThread(x0,y0,x1,y1,bright,depthValue,hueValue,angleValue){
  const dx=x1-x0,dy=y1-y0;
  const steps=Math.max(Math.abs(dx),Math.abs(dy));
  if(steps<2)return;
  for(let i=0;i<=steps;i++){
    const f=i/steps;
    stampCell(
      Math.round(x0+dx*f),
      Math.round(y0+dy*f),
      bright*(1-f*0.28),
      depthValue-0.02*f,
      hueValue,
      angleValue
    );
  }
}

function frame(){
  t+=0.015;
  pmx+=(mx-pmx)*0.07;
  pmy+=(my-pmy)*0.07;
  zoom+=(targetZoom-zoom)*0.22;
  pulses=pulses.filter(p=>t-p.born<3.8);
  clearFields();

  const rotY=t*0.34+(pmx-0.5)*2.5;
  const rotX=(pmy-0.5)*1.35+Math.sin(t*0.21)*0.18;
  const rotZ=Math.sin(t*0.17)*0.24;
  const sy=Math.sin(rotY),cy=Math.cos(rotY);
  const sx=Math.sin(rotX),cx=Math.cos(rotX);
  const sz=Math.sin(rotZ),cz=Math.cos(rotZ);

  let lastX=0,lastY=0,lastDepth=0,lastHue=0,lastAngle=0,lastOk=false;

  for(let i=0;i<N;i++){
    const drift=Math.sin(seed[i]*PHI+t*1.7)*0.12+Math.cos(i*0.09-t*2.1)*0.05;
    const shell=1+drift+0.08*Math.sin(i*0.021*PHI+t*0.9);

    let x=bx[i]*shell;
    let y=by[i]*(1+0.14*Math.cos(seed[i]*0.4+t*1.3));
    let z=bz[i]*shell;

    // Keep Fibonacci spacing, but push the shell out onto a cube surface.
    const maxComp=Math.max(Math.abs(x),Math.abs(y),Math.abs(z),0.0001);
    const cubeScale=1/maxComp;
    x*=cubeScale;
    y*=cubeScale;
    z*=cubeScale;

    const wobble=Math.sin(seed[i]*0.7+t+y*5)*0.12;
    x+=Math.cos(seed[i]+t*0.8)*wobble*0.2;
    z+=Math.sin(seed[i]-t*0.8)*wobble*0.2;
    y+=Math.sin(seed[i]*PHI*0.4+t*0.9)*0.08;

    const faceBands=Math.sin((x+y+z)*PHI*7+t*1.8)*0.07;
    const edgeGlow=(Math.max(Math.abs(x),Math.abs(y),Math.abs(z))-Math.min(Math.abs(x),Math.abs(y),Math.abs(z)))*0.08;
    x+=Math.sign(x)*(faceBands+edgeGlow);
    y+=Math.sign(y)*(faceBands*0.9+edgeGlow);
    z+=Math.sign(z)*(faceBands+edgeGlow);

    let x1=x*cy-z*sy;
    let z1=x*sy+z*cy;
    let y1=y*cx-z1*sx;
    let z2=y*sx+z1*cx;
    let x2=x1*cz-y1*sz;
    let y2=x1*sz+y1*cz;

    const camDepth=4.95-zoom*2.2;
    const projScale=1+(zoom-1)*1.18;
    const inv=1/(z2+camDepth);
    const px=x2*inv*cols*1.34*projScale+cols*0.5;
    const py=y2*inv*rows*1.72*projScale+rows*0.5;
    const gx=Math.round(px);
    const gy=Math.round(py);
    if(gx<0||gx>=cols||gy<0||gy>=rows){
      lastOk=false;
      continue;
    }

    let bright=0.22+inv*2.6+Math.max(0,drift)*0.45;
    const pulseAngle=Math.atan2(y2,x2);
    for(const pulse of pulses){
      const age=t-pulse.born;
      const pd=Math.sqrt((gx/cols-pulse.x)**2+(gy/rows-pulse.y)**2);
      const waveRadius=age*pulse.speed;
      const thickness=pulse.thickness+age*0.003;
      const ring=Math.abs(pd-waveRadius);
      if(ring<thickness){
        const hit=1-ring/thickness;
        bright+=pulse.strength*hit*2.8;
        x2+=Math.cos(pulseAngle)*hit*pulse.kick*0.34;
        y2+=Math.sin(pulseAngle)*hit*pulse.kick*0.28;
      }
    }

    const depthValue=inv;
    const hueValue=seed[i]*0.23+z2*1.8;
    const angleValue=Math.atan2(y2,x2);
    stampCell(gx,gy,bright,depthValue,hueValue,angleValue);

    if(lastOk&&i%3===0){
      drawThread(lastX,lastY,gx,gy,bright*0.52,Math.min(lastDepth,depthValue),hueValue,angleValue);
    }

    lastX=gx;
    lastY=gy;
    lastDepth=depthValue;
    lastHue=hueValue;
    lastAngle=angleValue;
    lastOk=true;
  }

  ctx.fillStyle='#06050a';
  ctx.fillRect(0,0,W,H);

  const cw=CELL*0.58;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const idx=r*cols+c;
      const e=energy[idx];
      if(e<0.14)continue;

      const norm=Math.min(1,e/2.8);
      const dep=Math.min(1,Math.max(0,(depthField[idx]-0.16)*1.25));
      let glyph;

      if(norm<0.22){
        glyph=DUST[Math.floor(norm*DUST.length*4)%DUST.length];
      }else if(norm<0.5){
        const dir=((Math.round(angleField[idx]/(Math.PI/4))%8)+8)%8;
        glyph=THREAD[dir%THREAD.length];
      }else if(norm<0.84){
        if(dep<0.22){
          glyph=ORBIT[Math.floor((hueField[idx]*3+t)%ORBIT.length+ORBIT.length)%ORBIT.length];
        }else{
          glyph=WEAVE[Math.floor((norm*WEAVE.length+hueField[idx])%WEAVE.length+WEAVE.length)%WEAVE.length];
        }
      }else{
        glyph=NODES[Math.floor((t*2+c*0.13+r*0.09)%NODES.length)];
      }

      if(norm>0.34){
        glyph+=ABOVE[Math.floor((t*2+c+r)%ABOVE.length)];
      }
      if(norm>0.52){
        glyph+=BELOW[Math.floor((t*1.4+c*2+r)%BELOW.length)];
      }
      if(norm>0.68){
        glyph+=ABOVE[Math.floor((t*2.7+c*3+r)%ABOVE.length)];
      }
      if(norm>0.84){
        glyph+=BELOW[Math.floor((t*1.9+c+r*2)%BELOW.length)];
      }
      if(norm>0.93){
        glyph+=STRIKE[Math.floor(t*3)%STRIKE.length];
      }

      const hue=34+dep*44+Math.sin(hueField[idx]*2+t)*18;
      const sat=24+norm*54;
      const lit=8+dep*42+norm*12;
      const rgb=hsl(hue,sat,lit);

      const md=Math.sqrt((c/cols-pmx)**2+(r/rows-pmy)**2);
      if(md<0.07){
        const boost=1-md/0.07;
        rgb[0]=Math.min(255,rgb[0]+boost*62);
        rgb[1]=Math.min(255,rgb[1]+boost*72);
        rgb[2]=Math.min(255,rgb[2]+boost*46);
      }

      ctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
      ctx.fillText(glyph,c*cw,r*CELL);
    }
  }

  if(!isTouch){
    const curX=pmx*W,curY=pmy*H;
    let cur='\u2316';
    if(pulses.length)cur+=ABOVE[Math.floor(t*4)%ABOVE.length];
    ctx.fillStyle='rgba(235,220,150,0.7)';
    ctx.font='14px Courier New';
    ctx.fillText(cur,curX-5,curY-8);
    ctx.font=CELL+'px Courier New';
  }

  requestAnimationFrame(frame);
}

function spawnPulse(px,py){
  for(let i=0;i<3;i++){
    pulses.push({
      x:px,
      y:py,
      born:t-i*0.09,
      strength:1.6+Math.random()*1.4,
      speed:0.12+i*0.035,
      thickness:0.042+i*0.01,
      kick:0.22+i*0.06
    });
  }
  if(pulses.length>12)pulses.splice(0,pulses.length-12);
}

document.addEventListener('mousemove',e=>{
  if(isTouch)return;
  mx=e.clientX/W;my=e.clientY/H;
});

document.addEventListener('click',e=>{
  if(isTouch)return;
  spawnPulse(e.clientX/W,e.clientY/H);
});

document.addEventListener('wheel',e=>{
  e.preventDefault();
  targetZoom=Math.max(0.35,Math.min(3.85,targetZoom-e.deltaY*0.00125));
},{passive:false});

function pinchDistance(t0,t1){
  const dx=t0.clientX-t1.clientX;
  const dy=t0.clientY-t1.clientY;
  return Math.hypot(dx,dy);
}

document.addEventListener('touchstart',e=>{
  isTouch=true;
  if(e.touches.length===2){
    pinchStart={d:pinchDistance(e.touches[0],e.touches[1]),zoom:targetZoom};
    touchStartPos=null;
  }else if(e.touches.length===1){
    const t0=e.touches[0];
    touchStartPos={x:t0.clientX,y:t0.clientY,time:performance.now()};
    mx=t0.clientX/W;my=t0.clientY/H;
  }
},{passive:false});

document.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===2 && pinchStart){
    const d=pinchDistance(e.touches[0],e.touches[1]);
    const ratio=d/pinchStart.d;
    targetZoom=Math.max(0.35,Math.min(3.85,pinchStart.zoom*ratio));
  }else if(e.touches.length===1){
    const t0=e.touches[0];
    mx=t0.clientX/W;my=t0.clientY/H;
    if(touchStartPos){
      const dx=t0.clientX-touchStartPos.x;
      const dy=t0.clientY-touchStartPos.y;
      if(Math.hypot(dx,dy)>14)touchStartPos=null;  // no longer a tap
    }
  }
},{passive:false});

document.addEventListener('touchend',e=>{
  if(e.touches.length<2)pinchStart=null;
  if(touchStartPos && e.changedTouches.length>0){
    const ct=e.changedTouches[0];
    const dx=ct.clientX-touchStartPos.x;
    const dy=ct.clientY-touchStartPos.y;
    const dt=performance.now()-touchStartPos.time;
    if(Math.hypot(dx,dy)<14 && dt<500){
      spawnPulse(ct.clientX/W,ct.clientY/H);
    }
    touchStartPos=null;
  }
});

window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,120));
resize();
frame();
</script>
</body>
</html>
